name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.2)'
        required: true
        type: string
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Sync dependencies
        run: go mod tidy

      - name: Cross-compile all platforms
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-X 'main.Version=${VERSION}' -X 'main.BuildTime=${BUILD_TIME}' -s -w"

          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"

          for PLATFORM in $PLATFORMS; do
            OS="${PLATFORM%/*}"
            ARCH="${PLATFORM#*/}"
            SUFFIX=""
            [ "$OS" = "windows" ] && SUFFIX=".exe"

            # Build binaries
            GOOS="$OS" GOARCH="$ARCH" CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o "build/xboard${SUFFIX}" ./cmd/server/
            GOOS="$OS" GOARCH="$ARCH" CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o "build/xboard-scheduler${SUFFIX}" ./cmd/scheduler/

            # Stage files
            STAGING="xboard-${VERSION}-${OS}-${ARCH}"
            mkdir -p "dist/${STAGING}/web" "dist/${STAGING}/storage/logs" "dist/${STAGING}/storage/data" "dist/${STAGING}/plugins"

            cp "build/xboard${SUFFIX}" "dist/${STAGING}/"
            cp "build/xboard-scheduler${SUFFIX}" "dist/${STAGING}/"
            cp -r web/* "dist/${STAGING}/web/"
            cp config.example.yaml "dist/${STAGING}/"
            cp Dockerfile "dist/${STAGING}/"

            # 部署脚本（按平台分发）
            if [ "$OS" = "windows" ]; then
              cp install.ps1 "dist/${STAGING}/"
            else
              cp install.sh  "dist/${STAGING}/"
              chmod +x "dist/${STAGING}/install.sh"
            fi

            # Archive
            cd dist
            if [ "$OS" = "windows" ]; then
              7z a -tzip "${STAGING}.zip" "${STAGING}/"
            else
              tar czf "${STAGING}.tar.gz" "${STAGING}/"
            fi
            rm -rf "${STAGING}"
            cd ..
          done

      - name: Generate release notes
        run: |
          cat << 'EOF' > release_notes.md
          # Xboard ${{ github.event.inputs.version }}

          ## 发布说明

          Xboard Go 重构版 —— 高性能代理管理面板。

          ### 包含组件

          | 组件 | 说明 |
          |------|------|
          | `xboard` / `xboard.exe` | API 服务主程序 |
          | `xboard-scheduler` / `xboard-scheduler.exe` | 独立定时任务调度器 |

          ### 系统要求

          - MySQL 8.0+ 或 SQLite 3
          - Redis 7+（可选，推荐用于缓存和队列）

          ### 部署文档

          详见项目 [DEPLOY.md](https://github.com/${{ github.repository }}/blob/master/DEPLOY.md)

          ---
          EOF

      - name: Copy install scripts to dist
        run: |
          cp install.sh   dist/xboard-${{ github.event.inputs.version }}-install.sh
          cp install.ps1  dist/xboard-${{ github.event.inputs.version }}-install.ps1

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body_path: release_notes.md
          prerelease: ${{ github.event.inputs.pre_release }}
          draft: false
          files: |
            dist/*.tar.gz
            dist/*.sh
            dist/*.ps1
          fail_on_unmatched_files: true
